<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发布商品 - 校园二手</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nav-root"></div>
<div class="container page-body" style="max-width:700px">
  <div class="card">
    <div class="card-title" id="page-title">发布商品</div>

    <!-- 图片上传 -->
    <div class="form-group">
      <label class="form-label">商品图片（最多6张）</label>
      <div id="img-preview-list" class="img-preview-list"></div>
      <div class="upload-area" onclick="triggerUpload()" id="upload-area">
        <div class="icon">📷</div>
        <div style="font-size:14px;color:#999">点击上传图片</div>
        <div style="font-size:12px;color:#bbb;margin-top:4px">支持JPG/PNG，单张不超过5MB</div>
      </div>
      <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
    </div>

    <div class="form-group">
      <label class="form-label">商品标题 <span style="color:var(--red)">*</span></label>
      <input class="form-input" id="p-title" placeholder="例：iPhone 12 128G 黑色 9成新" maxlength="50">
      <div class="form-hint" id="title-count">0/50</div>
    </div>

    <div class="form-group">
      <label class="form-label">商品描述 <span style="color:var(--red)">*</span></label>
      <textarea class="form-input" id="p-desc" rows="4" placeholder="描述商品成色、配件等信息（10-500字）" maxlength="500" style="resize:vertical"></textarea>
      <div class="form-hint" id="desc-count">0/500</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">出售价格 <span style="color:var(--red)">*</span></label>
        <div style="position:relative">
          <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#999">¥</span>
          <input class="form-input" id="p-price" type="number" min="0.01" step="0.01" placeholder="0.00" style="padding-left:26px">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">原价（选填）</label>
        <div style="position:relative">
          <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#999">¥</span>
          <input class="form-input" id="p-orig" type="number" min="0" step="0.01" placeholder="0.00" style="padding-left:26px">
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">商品分类 <span style="color:var(--red)">*</span></label>
        <select class="form-input" id="p-cate"></select>
      </div>
      <div class="form-group">
        <label class="form-label">成色 <span style="color:var(--red)">*</span></label>
        <select class="form-input" id="p-cond">
          <option>全新</option><option>99新</option><option selected>95新</option>
          <option>9成新</option><option>8成新</option><option>7成新及以下</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">所在位置</label>
      <input class="form-input" id="p-location" placeholder="例：北京海淀">
    </div>

    <div style="display:flex;gap:12px;margin-top:8px">
      <button class="btn btn-gray btn-block" onclick="saveDraft()">💾 存草稿</button>
      <button class="btn btn-primary btn-block" onclick="publishProduct()">🚀 立即发布</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="js/app.js"></script>
<script>
initSeedData();
if (!Auth.require()) { /* redirected */ }
document.getElementById('nav-root').innerHTML = renderNavbar();

// 分类
const cates = DB.getArr('categories').filter(c => c !== '全部');
const cateEl = document.getElementById('p-cate');
cates.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cateEl.appendChild(o); });

// 计数
document.getElementById('p-title').addEventListener('input', function() { document.getElementById('title-count').textContent = this.value.length + '/50'; });
document.getElementById('p-desc').addEventListener('input', function() { document.getElementById('desc-count').textContent = this.value.length + '/500'; });

// 编辑模式
const editId = new URLSearchParams(location.search).get('edit');
let editProduct = null;
if (editId) {
  editProduct = getProductById(editId);
  if (editProduct) {
    document.getElementById('page-title').textContent = '编辑商品';
    document.getElementById('p-title').value = editProduct.title;
    document.getElementById('p-desc').value = editProduct.desc;
    document.getElementById('p-price').value = editProduct.price;
    document.getElementById('p-orig').value = editProduct.origPrice || '';
    document.getElementById('p-cate').value = editProduct.category;
    document.getElementById('p-cond').value = editProduct.condition;
    document.getElementById('p-location').value = editProduct.location;
    images = [...(editProduct.images || [])];
    renderPreviews();
  }
}

// 图片
let images = [];
function triggerUpload() {
  if (images.length >= 6) { toast('最多上传6张图片'); return; }
  document.getElementById('file-input').click();
}
async function handleFiles(files) {
  for (const f of files) {
    if (images.length >= 6) break;
    if (f.size > 5 * 1024 * 1024) { toast(`${f.name} 超过5MB，已跳过`); continue; }
    const b64 = await compressImage(f);
    images.push(b64);
  }
  renderPreviews();
}
function renderPreviews() {
  const list = document.getElementById('img-preview-list');
  list.innerHTML = images.map((src, i) => `
    <div class="img-preview-item">
      <img src="${src}">
      <div class="del" onclick="removeImg(${i})">✕</div>
    </div>`).join('');
  document.getElementById('upload-area').style.display = images.length >= 6 ? 'none' : 'block';
}
function removeImg(i) { images.splice(i, 1); renderPreviews(); }

function getFormData() {
  return {
    title: document.getElementById('p-title').value.trim(),
    desc: document.getElementById('p-desc').value.trim(),
    price: parseFloat(document.getElementById('p-price').value),
    origPrice: parseFloat(document.getElementById('p-orig').value) || 0,
    category: document.getElementById('p-cate').value,
    condition: document.getElementById('p-cond').value,
    location: document.getElementById('p-location').value.trim() || '未知位置',
    images
  };
}

function validate(d) {
  if (!d.title || d.title.length < 2) { toast('标题至少2个字符'); return false; }
  if (!d.desc || d.desc.length < 10) { toast('描述至少10个字符'); return false; }
  if (!d.price || d.price <= 0) { toast('请填写正确的价格'); return false; }
  return true;
}

function publishProduct() {
  const cur = Auth.cur();
  const d = getFormData();
  if (!validate(d)) return;
  const products = DB.getArr('products');
  if (editId && editProduct) {
    const idx = products.findIndex(x => x.id === editId);
    if (idx > -1) {
      Object.assign(products[idx], d, { updatedAt: Date.now() });
      DB.set('products', products);
      toast('商品已更新');
      setTimeout(() => location.href = 'product.html?id=' + editId, 800);
      return;
    }
  }
  const p = { id: uid(), sellerId: cur.id, ...d, status: 'on', views: 0, favs: 0, createdAt: Date.now() };
  DB.push('products', p);
  toast('发布成功！');
  setTimeout(() => location.href = 'product.html?id=' + p.id, 800);
}

function saveDraft() {
  const d = getFormData();
  if (!d.title) { toast('请至少填写标题'); return; }
  const cur = Auth.cur();
  const p = { id: uid(), sellerId: cur.id, ...d, status: 'draft', views: 0, favs: 0, createdAt: Date.now() };
  DB.push('products', p);
  toast('草稿已保存');
  setTimeout(() => location.href = 'profile.html', 800);
}
</script>
</body>
</html>
