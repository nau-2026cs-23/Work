<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的订单 - 校园二手</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nav-root"></div>

<div class="tabs" id="main-tabs">
  <div class="tab active" onclick="switchRole('buy')">我买到的</div>
  <div class="tab" onclick="switchRole('sell')">我卖出的</div>
</div>
<div class="tabs" id="status-tabs" style="font-size:13px"></div>

<div class="container page-body">
  <div id="order-list"></div>
</div>

<!-- 发货弹窗 -->
<div id="ship-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">填写发货信息</div>
    <input type="hidden" id="ship-oid">
    <div class="form-group">
      <label class="form-label">发货方式</label>
      <select class="form-input" id="ship-type-modal">
        <option value="快递">快递发货</option>
        <option value="自提">同城自提</option>
      </select>
    </div>
    <div class="form-group" id="ship-no-group">
      <label class="form-label">快递单号</label>
      <input class="form-input" id="ship-no-input" placeholder="请输入快递单号">
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeShipModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmShip()">确认发货</button>
    </div>
  </div>
</div>

<!-- 评价弹窗 -->
<div id="review-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">交易评价</div>
    <input type="hidden" id="review-oid">
    <div class="form-group">
      <label class="form-label">评分</label>
      <div id="star-picker" style="display:flex;gap:8px;font-size:28px;cursor:pointer">
        ${[1,2,3,4,5].map(i => `<span onclick="setRating(${i})" id="star-${i}" style="opacity:.3">⭐</span>`).join('')}
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">评价内容</label>
      <textarea class="form-input" id="review-content" rows="3" placeholder="描述您的交易体验..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeReviewModal()">取消</button>
      <button class="btn btn-primary" onclick="submitReview()">提交评价</button>
    </div>
  </div>
</div>

<!-- 退款弹窗 -->
<div id="refund-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">申请退款</div>
    <input type="hidden" id="refund-oid">
    <div class="form-group">
      <label class="form-label">退款原因</label>
      <select class="form-input" id="refund-reason">
        <option>商品与描述不符</option>
        <option>商品损坏</option>
        <option>未收到商品</option>
        <option>其他原因</option>
      </select>
    </div>
    <div class="form-group">
      <textarea class="form-input" id="refund-detail" rows="3" placeholder="请详细描述退款原因..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="document.getElementById('refund-modal').style.display='none'">取消</button>
      <button class="btn btn-danger" onclick="submitRefund()">提交申请</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="js/app.js"></script>
<script>
initSeedData();
if (!Auth.require()) { /* redirected */ }
document.getElementById('nav-root').innerHTML = renderNavbar();

const STATUS_LABELS = {
  pending_pay: { text: '待付款', cls: 'pending-pay' },
  pending_ship: { text: '待发货', cls: 'pending-ship' },
  pending_recv: { text: '待收货', cls: 'pending-recv' },
  pending_review: { text: '待评价', cls: 'pending-ship' },
  done: { text: '已完成', cls: 'done' },
  cancelled: { text: '已取消', cls: 'cancelled' },
  refunding: { text: '退款中', cls: 'pending-pay' }
};
const TABS_BUY = [
  { key: 'all', label: '全部' },
  { key: 'pending_pay', label: '待付款' },
  { key: 'pending_ship', label: '待发货' },
  { key: 'pending_recv', label: '待收货' },
  { key: 'pending_review', label: '待评价' },
  { key: 'done', label: '已完成' }
];

let role = 'buy', activeStatus = 'all';
let curRating = 5;

function switchRole(r) {
  role = r; activeStatus = 'all';
  document.querySelectorAll('#main-tabs .tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && r === 'buy') || (i === 1 && r === 'sell')));
  renderStatusTabs();
  renderOrders();
}
function switchStatus(s) {
  activeStatus = s;
  renderStatusTabs();
  renderOrders();
}
function renderStatusTabs() {
  const tabs = document.getElementById('status-tabs');
  tabs.innerHTML = TABS_BUY.map(t => `<div class="tab ${activeStatus === t.key ? 'active' : ''}" onclick="switchStatus('${t.key}')">${t.label}</div>`).join('');
}
renderStatusTabs();

function renderOrders() {
  const cur = Auth.cur();
  let orders = DB.getArr('orders');
  orders = role === 'buy' ? orders.filter(o => o.buyerId === cur.id) : orders.filter(o => o.sellerId === cur.id);
  if (activeStatus !== 'all') orders = orders.filter(o => o.status === activeStatus);
  orders.sort((a, b) => b.createdAt - a.createdAt);

  const el = document.getElementById('order-list');
  if (orders.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>暂无订单</p></div>';
    return;
  }
  el.innerHTML = orders.map(renderOrderCard).join('');
}

function renderOrderCard(o) {
  const p = getProductById(o.productId);
  const sl = STATUS_LABELS[o.status] || { text: o.status, cls: '' };
  const cur = Auth.cur();
  const isBuyer = o.buyerId === cur.id;
  const emoji = p ? catEmoji(p.category) : '📦';

  let actions = '';
  if (o.status === 'pending_pay' && isBuyer) {
    actions += `<button class="btn btn-primary btn-sm" onclick="payOrder('${o.id}')">立即付款</button>`;
    actions += `<button class="btn btn-gray btn-sm" onclick="cancelOrder('${o.id}')">取消订单</button>`;
  }
  if (o.status === 'pending_ship' && !isBuyer) {
    actions += `<button class="btn btn-primary btn-sm" onclick="showShipModal('${o.id}')">确认发货</button>`;
  }
  if (o.status === 'pending_recv' && isBuyer) {
    actions += `<button class="btn btn-success btn-sm" onclick="confirmRecv('${o.id}')">确认收货</button>`;
    actions += `<button class="btn btn-gray btn-sm" onclick="viewLogistics('${o.id}')">查看物流</button>`;
    actions += `<button class="btn btn-outline btn-sm" onclick="showRefund('${o.id}')">申请退款</button>`;
  }
  if (o.status === 'pending_review') {
    actions += `<button class="btn btn-primary btn-sm" onclick="showReview('${o.id}')">去评价</button>`;
  }
  if (o.status === 'done' || o.status === 'pending_review') {
    if (!isBuyer) actions += `<button class="btn btn-outline btn-sm" onclick="chatWithBuyer('${o.buyerId}','${o.productId}')">联系买家</button>`;
    else actions += `<button class="btn btn-outline btn-sm" onclick="location.href='chat.html?uid=${o.sellerId}&pid=${o.productId}'">联系卖家</button>`;
  }

  return `
  <div class="order-card">
    <div class="order-header">
      <span style="font-size:12px;color:#999">订单号：${o.id} · ${fmtDate(o.createdAt)}</span>
      <span class="order-status ${sl.cls}">${sl.text}</span>
    </div>
    <div class="order-item" onclick="p && (location.href='product.html?id=${o.productId}')" style="cursor:pointer">
      <div class="order-item-img">${p && p.images && p.images[0] ? `<img src="${p.images[0]}" style="width:100%;height:100%;object-fit:cover;border-radius:8px">` : emoji}</div>
      <div class="order-item-info">
        <div class="order-item-title">${p ? escHtml(p.title) : '商品已删除'}</div>
        <div style="font-size:12px;color:#999;margin-top:2px">${o.shipType} · ${escHtml(o.address || '')}</div>
        <div class="order-item-price">${fmtMoney(o.price)}</div>
      </div>
    </div>
    ${o.status === 'pending_recv' && o.shipNo ? `<div style="padding:8px 0;font-size:13px;color:#666">📦 快递单号：${o.shipNo}</div>` : ''}
    ${actions ? `<div class="order-footer">${actions}</div>` : ''}
  </div>`;
}

function payOrder(oid) {
  if (!confirm('确认完成支付？（模拟担保交易，资金由平台托管）')) return;
  const orders = DB.getArr('orders');
  const idx = orders.findIndex(o => o.id === oid);
  if (idx < 0) return;
  orders[idx].status = 'pending_ship';
  orders[idx].paidAt = Date.now();
  DB.set('orders', orders);
  addNotif(orders[idx].sellerId, 'order', '买家已付款，请尽快发货');
  toast('付款成功！等待卖家发货');
  renderOrders();
}

function cancelOrder(oid) {
  if (!confirm('确认取消订单？')) return;
  const orders = DB.getArr('orders');
  const idx = orders.findIndex(o => o.id === oid);
  if (idx < 0) return;
  // 恢复商品上架
  const products = DB.getArr('products');
  const pidx = products.findIndex(p => p.id === orders[idx].productId);
  if (pidx > -1) { products[pidx].status = 'on'; DB.set('products', products); }
  orders[idx].status = 'cancelled';
  orders[idx].cancelledAt = Date.now();
  DB.set('orders', orders);
  toast('订单已取消，商品已重新上架');
  renderOrders();
}

function showShipModal(oid) {
  document.getElementById('ship-oid').value = oid;
  document.getElementById('ship-no-input').value = '';
  document.getElementById('ship-modal').style.display = 'flex';
  document.getElementById('ship-type-modal').onchange = function() {
    document.getElementById('ship-no-group').style.display = this.value === '快递' ? '' : 'none';
  };
}
function closeShipModal() { document.getElementById('ship-modal').style.display = 'none'; }
function confirmShip() {
  const oid = document.getElementById('ship-oid').value;
  const type = document.getElementById('ship-type-modal').value;
  const no = document.getElementById('ship-no-input').value.trim();
  if (type === '快递' && !no) { toast('请输入快递单号'); return; }
  const orders = DB.getArr('orders');
  const idx = orders.findIndex(o => o.id === oid);
  orders[idx].status = 'pending_recv';
  orders[idx].shipType = type;
  orders[idx].shipNo = no;
  orders[idx].shippedAt = Date.now();
  DB.set('orders', orders);
  addNotif(orders[idx].buyerId, 'order', `卖家已发货${no ? '，快递单号：' + no : ''}，请注意查收`);
  closeShipModal();
  toast('发货成功！');
  renderOrders();
}

function confirmRecv(oid) {
  if (!confirm('确认已收到商品？确认后资金将打给卖家')) return;
  const orders = DB.getArr('orders');
  const idx = orders.findIndex(o => o.id === oid);
  orders[idx].status = 'pending_review';
  orders[idx].doneAt = Date.now();
  DB.set('orders', orders);
  addNotif(orders[idx].sellerId, 'order', '买家已确认收货，资金已打入您的账户');
  toast('收货确认！资金已释放给卖家，请记得评价');
  renderOrders();
}

function viewLogistics(oid) {
  const o = DB.getArr('orders').find(x => x.id === oid);
  if (!o || !o.shipNo) { toast('暂无物流信息'); return; }
  alert(`物流查询（模拟）\n快递单号：${o.shipNo}\n状态：运输中`);
}

function showReview(oid) {
  document.getElementById('review-oid').value = oid;
  curRating = 5;
  updateStars(5);
  document.getElementById('review-content').value = '';
  document.getElementById('review-modal').style.display = 'flex';
}
function closeReviewModal() { document.getElementById('review-modal').style.display = 'none'; }
function setRating(r) { curRating = r; updateStars(r); }
function updateStars(r) { [1,2,3,4,5].forEach(i => document.getElementById('star-' + i).style.opacity = i <= r ? '1' : '.3'); }

function submitReview() {
  const oid = document.getElementById('review-oid').value;
  const content = document.getElementById('review-content').value.trim();
  if (!content) { toast('请填写评价内容'); return; }
  const cur = Auth.cur();
  const o = DB.getArr('orders').find(x => x.id === oid);
  if (!o) return;
  const isBuyer = o.buyerId === cur.id;
  DB.push('reviews', { id: uid(), orderId: oid, fromId: cur.id, toId: isBuyer ? o.sellerId : o.buyerId, rating: curRating, content, createdAt: Date.now() });
  const orders = DB.getArr('orders');
  const idx = orders.findIndex(x => x.id === oid);
  orders[idx].status = 'done';
  orders[idx].reviewed = true;
  DB.set('orders', orders);
  closeReviewModal();
  toast('评价成功！');
  renderOrders();
}

function showRefund(oid) {
  document.getElementById('refund-oid').value = oid;
  document.getElementById('refund-modal').style.display = 'flex';
}
function submitRefund() {
  const oid = document.getElementById('refund-oid').value;
  const reason = document.getElementById('refund-reason').value;
  const detail = document.getElementById('refund-detail').value;
  const orders = DB.getArr('orders');
  const idx = orders.findIndex(o => o.id === oid);
  if (idx < 0) return;
  orders[idx].status = 'refunding';
  orders[idx].refundReason = reason + (detail ? '：' + detail : '');
  DB.set('orders', orders);
  addNotif(orders[idx].sellerId, 'order', `买家申请退款，原因：${reason}`);
  document.getElementById('refund-modal').style.display = 'none';
  toast('退款申请已提交，平台将在1-3个工作日内处理');
  renderOrders();
}

function chatWithBuyer(uid, pid) { location.href = `chat.html?uid=${uid}&pid=${pid}`; }

renderOrders();
</script>
</body>
</html>
