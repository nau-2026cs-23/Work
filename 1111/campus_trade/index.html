<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园二手交易平台</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nav-root"></div>

<!-- 分类栏 -->
<div class="category-bar" id="cate-bar"></div>

<!-- 主内容 -->
<div class="container page-body">
  <!-- Banner -->
  <div class="banner-wrap" id="banner-wrap"></div>

  <!-- 筛选栏 (搜索时显示) -->
  <div id="search-header" style="display:none">
    <div style="font-size:16px;font-weight:600;margin-bottom:12px">
      搜索 "<span id="search-kw"></span>" 的结果
    </div>
    <div class="search-filters" id="filter-bar"></div>
  </div>

  <!-- 商品网格 -->
  <div class="goods-grid" id="goods-grid"></div>
  <div id="goods-empty" class="empty-state" style="display:none">
    <div class="icon">🔍</div><p>暂无相关商品</p>
  </div>
</div>

<script src="js/app.js"></script>
<script>
initSeedData();

const params = new URLSearchParams(location.search);
const q = params.get('q') || '';
const cate = params.get('cate') || '全部';

document.getElementById('nav-root').innerHTML = renderNavbar(q);

// 分类栏
const cates = DB.getArr('categories');
const cateBar = document.getElementById('cate-bar');
cates.forEach(c => {
  const span = document.createElement('span');
  span.className = 'cat-tag' + (c === cate ? ' active' : '');
  span.textContent = c;
  span.onclick = () => {
    const url = new URL(location.href);
    url.searchParams.set('cate', c);
    url.searchParams.delete('q');
    location.href = url.toString();
  };
  cateBar.appendChild(span);
});

// Banner
const banners = DB.getArr('banners');
let bannerIdx = 0;
const bwrap = document.getElementById('banner-wrap');
if (banners.length) {
  bwrap.innerHTML = `
    <div class="banner-slider" id="bslider">
      ${banners.map(b => `<div class="banner-slide" style="background:${b.color}">
        <div style="text-align:center"><div style="font-size:28px;font-weight:700">${b.title}</div><div style="font-size:14px;opacity:.85;margin-top:6px">${b.subtitle}</div></div>
      </div>`).join('')}
    </div>
    <div class="banner-dots" id="bdots">
      ${banners.map((_,i) => `<div class="banner-dot ${i===0?'active':''}" onclick="setBanner(${i})"></div>`).join('')}
    </div>`;
  setInterval(() => setBanner((bannerIdx + 1) % banners.length), 3500);
}
function setBanner(i) {
  bannerIdx = i;
  document.getElementById('bslider').style.transform = `translateX(-${i * 100}%)`;
  document.querySelectorAll('.banner-dot').forEach((d, j) => d.classList.toggle('active', j === i));
}

// 搜索/筛选状态
let activeCond = '';
let sortBy = 'newest';

if (q) {
  document.getElementById('search-header').style.display = 'block';
  document.getElementById('search-kw').textContent = q;
  bwrap.style.display = 'none';
  renderFilters();
}

function renderFilters() {
  const conditions = ['全新','99新','95新','9成新','8成新'];
  const fb = document.getElementById('filter-bar');
  fb.innerHTML = `
    <span style="font-size:13px;color:#999;align-self:center">成色：</span>
    ${conditions.map(c => `<button class="filter-btn ${activeCond===c?'active':''}" onclick="filterCond('${c}')">${c}</button>`).join('')}
    <span style="font-size:13px;color:#999;align-self:center;margin-left:8px">排序：</span>
    <button class="filter-btn ${sortBy==='newest'?'active':''}" onclick="setSort('newest')">最新</button>
    <button class="filter-btn ${sortBy==='price_asc'?'active':''}" onclick="setSort('price_asc')">价格↑</button>
    <button class="filter-btn ${sortBy==='price_desc'?'active':''}" onclick="setSort('price_desc')">价格↓</button>
  `;
}
function filterCond(c) { activeCond = activeCond === c ? '' : c; renderFilters(); renderGoods(); }
function setSort(s) { sortBy = s; renderFilters(); renderGoods(); }

// 渲染商品
function renderGoods() {
  let products = DB.getArr('products').filter(p => p.status === 'on');
  if (q) products = products.filter(p => p.title.includes(q) || p.desc.includes(q) || p.category.includes(q));
  if (cate && cate !== '全部') products = products.filter(p => p.category === cate);
  if (activeCond) products = products.filter(p => p.condition === activeCond);
  if (sortBy === 'newest') products.sort((a, b) => b.createdAt - a.createdAt);
  else if (sortBy === 'price_asc') products.sort((a, b) => a.price - b.price);
  else if (sortBy === 'price_desc') products.sort((a, b) => b.price - a.price);

  const grid = document.getElementById('goods-grid');
  const empty = document.getElementById('goods-empty');
  if (products.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; }
  else { empty.style.display = 'none'; grid.innerHTML = products.map(renderGoodsCard).join(''); }
}
renderGoods();
</script>
</body>
</html>
