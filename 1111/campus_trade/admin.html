<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 校园二手</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="toast"></div>
<div class="admin-layout">
  <!-- 侧边栏 -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">🏫 校园二手<br><span style="font-size:11px;opacity:.6">管理后台</span></div>
    <div class="admin-menu-item active" onclick="switchPanel('dashboard')" id="menu-dashboard"><span style="font-size:18px">📊</span><span>数据概览</span></div>
    <div class="admin-menu-item" onclick="switchPanel('users')" id="menu-users"><span style="font-size:18px">👥</span><span>用户管理</span></div>
    <div class="admin-menu-item" onclick="switchPanel('products')" id="menu-products"><span style="font-size:18px">🛍️</span><span>商品管理</span></div>
    <div class="admin-menu-item" onclick="switchPanel('orders')" id="menu-orders"><span style="font-size:18px">📦</span><span>订单管理</span></div>
    <div class="admin-menu-item" onclick="switchPanel('content')" id="menu-content"><span style="font-size:18px">📢</span><span>内容管理</span></div>
    <div class="admin-menu-item" onclick="location.href='index.html'" style="margin-top:auto"><span style="font-size:18px">🏠</span><span>返回前台</span></div>
    <div class="admin-menu-item" onclick="adminLogout()" style="color:#e74c3c"><span style="font-size:18px">🚪</span><span>退出</span></div>
  </aside>

  <!-- 内容区 -->
  <main class="admin-content" id="admin-main"></main>
</div>

<script src="js/app.js"></script>
<script>
initSeedData();

// 权限校验
if (!Auth.isAdmin()) {
  document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px">
    <div style="font-size:64px">🔒</div>
    <div style="font-size:18px;font-weight:600">无访问权限</div>
    <div style="color:#999">需要管理员账号登录</div>
    <a href="login.html" class="btn btn-primary">去登录</a>
  </div>`;
  throw new Error('Unauthorized');
}

let activePanel = 'dashboard';

function switchPanel(panel) {
  activePanel = panel;
  document.querySelectorAll('.admin-menu-item').forEach(el => el.classList.remove('active'));
  document.getElementById('menu-' + panel)?.classList.add('active');
  const renders = { dashboard: renderDashboard, users: renderUsers, products: renderProducts, orders: renderOrders, content: renderContent };
  (renders[panel] || renderDashboard)();
}

// ================== 概览 ==================
function renderDashboard() {
  const users = DB.getArr('users').filter(u => u.role !== 'admin');
  const products = DB.getArr('products');
  const orders = DB.getArr('orders');
  const onProducts = products.filter(p => p.status === 'on');
  const doneOrders = orders.filter(o => o.status === 'done' || o.status === 'pending_review');
  const revenue = doneOrders.reduce((s, o) => s + o.price, 0);

  // 近7天注册
  const now = Date.now();
  const week = 7 * 86400000;
  const newUsers = users.filter(u => now - u.createdAt < week).length;
  const newProducts = products.filter(p => now - p.createdAt < week).length;

  document.getElementById('admin-main').innerHTML = `
    <h2 style="font-size:20px;font-weight:700;margin-bottom:20px">数据概览</h2>
    <div class="stats-grid">
      ${[
        { icon: '👥', label: '注册用户', num: users.length, sub: `本周新增 ${newUsers}`, color: '#e8f4fd', iconColor: '#3498db' },
        { icon: '🛍️', label: '在售商品', num: onProducts.length, sub: `本周新增 ${newProducts}`, color: '#e8f8ef', iconColor: '#27ae60' },
        { icon: '📦', label: '成交订单', num: doneOrders.length, sub: '历史累计', color: '#fff3ee', iconColor: '#ff6b35' },
        { icon: '💰', label: '成交金额', num: '¥' + revenue.toFixed(0), sub: '历史累计', color: '#fde8e8', iconColor: '#e74c3c' }
      ].map(s => `
        <div class="stat-card">
          <div class="stat-card-icon" style="background:${s.color};color:${s.iconColor}">${s.icon}</div>
          <div>
            <div class="stat-card-num">${s.num}</div>
            <div class="stat-card-label">${s.label} · ${s.sub}</div>
          </div>
        </div>`).join('')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px">
      <div class="card">
        <div class="card-title">最新注册用户</div>
        <table>
          <thead><tr><th>昵称</th><th>手机</th><th>注册时间</th></tr></thead>
          <tbody>
            ${users.slice(-5).reverse().map(u => `
              <tr>
                <td>${escHtml(u.nickname)} ${u.verified ? '✅' : ''}</td>
                <td>${u.phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2')}</td>
                <td>${fmtDate(u.createdAt)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="card">
        <div class="card-title">最新订单</div>
        <table>
          <thead><tr><th>商品</th><th>金额</th><th>状态</th></tr></thead>
          <tbody>
            ${orders.slice(-5).reverse().map(o => {
              const p = getProductById(o.productId);
              return `<tr>
                <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p ? escHtml(p.title) : '已删除'}</td>
                <td style="color:var(--primary);font-weight:600">${fmtMoney(o.price)}</td>
                <td><span class="status-badge ${o.status === 'done' ? 'active' : 'pending'}">${{pending_pay:'待付款',pending_ship:'待发货',pending_recv:'待收货',pending_review:'待评价',done:'已完成',cancelled:'已取消',refunding:'退款中'}[o.status]||o.status}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

// ================== 用户 ==================
let userSearch = '';
function renderUsers() {
  let users = DB.getArr('users').filter(u => u.role !== 'admin');
  if (userSearch) users = users.filter(u => u.nickname.includes(userSearch) || u.phone.includes(userSearch));
  users = users.sort((a, b) => b.createdAt - a.createdAt);

  document.getElementById('admin-main').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h2 style="font-size:20px;font-weight:700">用户管理</h2>
      <div style="display:flex;gap:8px">
        <input class="form-input" placeholder="搜索昵称/手机号" value="${userSearch}" oninput="userSearch=this.value;renderUsers()" style="width:200px">
      </div>
    </div>
    <table>
      <thead><tr><th>用户</th><th>手机</th><th>认证</th><th>发布</th><th>注册时间</th><th>状态</th><th>操作</th></tr></thead>
      <tbody>
        ${users.map(u => {
          const pubCount = DB.getArr('products').filter(p => p.sellerId === u.id).length;
          return `<tr>
            <td><div style="display:flex;align-items:center;gap:8px">
              <div style="width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden">
                ${u.avatar ? `<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover">` : u.nickname.charAt(0)}
              </div>
              <span>${escHtml(u.nickname)}</span>
            </div></td>
            <td>${u.phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2')}</td>
            <td>${u.verified ? '<span class="status-badge active">已认证</span>' : '<span style="color:#999;font-size:12px">未认证</span>'}</td>
            <td>${pubCount}</td>
            <td>${fmtDate(u.createdAt)}</td>
            <td><span class="status-badge ${u.banned ? 'banned' : 'active'}">${u.banned ? '已封禁' : '正常'}</span></td>
            <td>
              ${u.banned
                ? `<button class="btn btn-success btn-sm" onclick="toggleBan('${u.id}',false)">解封</button>`
                : `<button class="btn btn-danger btn-sm" onclick="toggleBan('${u.id}',true)">封禁</button>`}
              <button class="btn btn-gray btn-sm" style="margin-left:4px" onclick="location.href='profile.html?uid=${u.id}'">查看</button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function toggleBan(uid, ban) {
  if (ban && !confirm('确认封禁该用户？')) return;
  const users = DB.getArr('users');
  const idx = users.findIndex(u => u.id === uid);
  users[idx].banned = ban;
  DB.set('users', users);
  toast(ban ? '已封禁' : '已解封');
  renderUsers();
}

// ================== 商品 ==================
let prodSearch = '', prodStatus = 'all';
function renderProducts() {
  let products = DB.getArr('products');
  if (prodSearch) products = products.filter(p => p.title.includes(prodSearch));
  if (prodStatus !== 'all') products = products.filter(p => p.status === prodStatus);
  products = products.sort((a, b) => b.createdAt - a.createdAt);

  document.getElementById('admin-main').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h2 style="font-size:20px;font-weight:700">商品管理</h2>
      <div style="display:flex;gap:8px">
        <select class="form-input" onchange="prodStatus=this.value;renderProducts()" style="width:120px">
          <option value="all">全部</option>
          <option value="on">在售</option>
          <option value="off">已下架</option>
          <option value="sold">已售出</option>
          <option value="draft">草稿</option>
        </select>
        <input class="form-input" placeholder="搜索标题" value="${prodSearch}" oninput="prodSearch=this.value;renderProducts()" style="width:200px">
      </div>
    </div>
    <table>
      <thead><tr><th>商品</th><th>卖家</th><th>价格</th><th>分类</th><th>状态</th><th>发布时间</th><th>操作</th></tr></thead>
      <tbody>
        ${products.map(p => {
          const seller = getUserById(p.sellerId);
          const statusMap = { on: '在售', off: '已下架', sold: '已售', draft: '草稿' };
          const statusCls = { on: 'active', off: 'banned', sold: '', draft: '' };
          return `<tr>
            <td style="max-width:160px">
              <div style="display:flex;align-items:center;gap:8px">
                <div style="width:40px;height:40px;border-radius:6px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0">
                  ${p.images && p.images[0] ? `<img src="${p.images[0]}" style="width:100%;height:100%;object-fit:cover">` : catEmoji(p.category)}
                </div>
                <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(p.title)}</span>
              </div>
            </td>
            <td>${seller ? escHtml(seller.nickname) : '—'}</td>
            <td style="color:var(--primary);font-weight:600">${fmtMoney(p.price)}</td>
            <td>${p.category}</td>
            <td><span class="status-badge ${statusCls[p.status] || 'pending'}">${statusMap[p.status] || p.status}</span></td>
            <td>${fmtDate(p.createdAt)}</td>
            <td>
              <button class="btn btn-gray btn-sm" onclick="location.href='product.html?id=${p.id}'">查看</button>
              ${p.status === 'on' ? `<button class="btn btn-danger btn-sm" style="margin-left:4px" onclick="takeDown('${p.id}')">下架</button>` : ''}
              <button class="btn btn-danger btn-sm" style="margin-left:4px;background:#fde8e8;color:var(--red)" onclick="deleteProduct('${p.id}')">删除</button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function takeDown(pid) {
  if (!confirm('确认下架该商品？')) return;
  const products = DB.getArr('products');
  const idx = products.findIndex(p => p.id === pid);
  products[idx].status = 'off';
  DB.set('products', products);
  toast('已下架');
  renderProducts();
}
function deleteProduct(pid) {
  if (!confirm('确认删除该商品？此操作不可撤销')) return;
  DB.set('products', DB.getArr('products').filter(p => p.id !== pid));
  toast('已删除');
  renderProducts();
}

// ================== 订单 ==================
let orderSearch = '', orderStatus = 'all';
function renderOrders() {
  let orders = DB.getArr('orders');
  if (orderStatus !== 'all') orders = orders.filter(o => o.status === orderStatus);
  orders = orders.sort((a, b) => b.createdAt - a.createdAt);
  const statusMap = { pending_pay:'待付款', pending_ship:'待发货', pending_recv:'待收货', pending_review:'待评价', done:'已完成', cancelled:'已取消', refunding:'退款中' };

  document.getElementById('admin-main').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h2 style="font-size:20px;font-weight:700">订单管理</h2>
      <select class="form-input" onchange="orderStatus=this.value;renderOrders()" style="width:140px">
        <option value="all">全部订单</option>
        ${Object.entries(statusMap).map(([k,v]) => `<option value="${k}">${v}</option>`).join('')}
      </select>
    </div>
    <table>
      <thead><tr><th>订单号</th><th>商品</th><th>买家</th><th>金额</th><th>状态</th><th>下单时间</th><th>操作</th></tr></thead>
      <tbody>
        ${orders.map(o => {
          const p = getProductById(o.productId);
          const buyer = getUserById(o.buyerId);
          return `<tr>
            <td style="font-size:12px;color:#999">${o.id.slice(0, 10)}…</td>
            <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p ? escHtml(p.title) : '已删除'}</td>
            <td>${buyer ? escHtml(buyer.nickname) : '—'}</td>
            <td style="color:var(--primary);font-weight:600">${fmtMoney(o.price)}</td>
            <td><span class="status-badge ${o.status==='done'?'active':o.status==='cancelled'?'banned':'pending'}">${statusMap[o.status]||o.status}</span></td>
            <td>${fmtDate(o.createdAt)}</td>
            <td>
              ${o.status === 'refunding' ? `<button class="btn btn-success btn-sm" onclick="handleRefund('${o.id}')">处理退款</button>` : ''}
              ${o.status !== 'done' && o.status !== 'cancelled' ? `<button class="btn btn-gray btn-sm" onclick="forceClose('${o.id}')">强制关闭</button>` : ''}
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function handleRefund(oid) {
  if (!confirm('确认退款给买家？资金将退回买家账户')) return;
  const orders = DB.getArr('orders');
  const idx = orders.findIndex(o => o.id === oid);
  const o = orders[idx];
  orders[idx].status = 'cancelled';
  orders[idx].refundedAt = Date.now();
  DB.set('orders', orders);
  // 恢复商品
  const products = DB.getArr('products');
  const pidx = products.findIndex(p => p.id === o.productId);
  if (pidx > -1) { products[pidx].status = 'on'; DB.set('products', products); }
  addNotif(o.buyerId, 'order', '退款已处理，款项已退回您的账户');
  addNotif(o.sellerId, 'order', '买家退款申请已通过');
  toast('退款处理完成');
  renderOrders();
}

function forceClose(oid) {
  if (!confirm('确认强制关闭此订单？')) return;
  const orders = DB.getArr('orders');
  const idx = orders.findIndex(o => o.id === oid);
  orders[idx].status = 'cancelled';
  DB.set('orders', orders);
  toast('订单已关闭');
  renderOrders();
}

// ================== 内容管理 ==================
function renderContent() {
  const banners = DB.getArr('banners');
  const cates = DB.getArr('categories').filter(c => c !== '全部');

  document.getElementById('admin-main').innerHTML = `
    <h2 style="font-size:20px;font-weight:700;margin-bottom:20px">内容管理</h2>
    
    <!-- 轮播图 -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">轮播图管理</div>
      <table style="margin-bottom:12px">
        <thead><tr><th>ID</th><th>标题</th><th>副标题</th><th>操作</th></tr></thead>
        <tbody>
          ${banners.map(b => `<tr>
            <td style="font-size:12px;color:#999">${b.id}</td>
            <td>${b.title}</td>
            <td>${b.subtitle}</td>
            <td><button class="btn btn-danger btn-sm" onclick="delBanner('${b.id}')">删除</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input class="form-input" id="new-banner-title" placeholder="标题" style="flex:1;min-width:120px">
        <input class="form-input" id="new-banner-sub" placeholder="副标题" style="flex:1;min-width:120px">
        <button class="btn btn-primary" onclick="addBanner()">+ 添加</button>
      </div>
    </div>

    <!-- 分类管理 -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">分类管理</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
        ${cates.map(c => `<div style="display:flex;align-items:center;gap:4px;background:#f0f0f0;padding:4px 10px;border-radius:16px;font-size:13px">
          ${c}
          <span onclick="delCate('${c}')" style="cursor:pointer;color:#999;font-size:11px">✕</span>
        </div>`).join('')}
      </div>
      <div style="display:flex;gap:8px">
        <input class="form-input" id="new-cate" placeholder="新分类名称" style="flex:1">
        <button class="btn btn-primary" onclick="addCate()">+ 添加</button>
      </div>
    </div>

    <!-- 公告 -->
    <div class="card">
      <div class="card-title">系统公告</div>
      <div class="form-group">
        <textarea class="form-input" id="notice-content" rows="3" placeholder="输入公告内容...">${DB.get('notice') || ''}</textarea>
      </div>
      <button class="btn btn-primary" onclick="saveNotice()">保存公告</button>
      ${DB.get('notice') ? `<button class="btn btn-gray" style="margin-left:8px" onclick="sendNotice()">群发给所有用户</button>` : ''}
    </div>`;
}

function delBanner(id) {
  DB.set('banners', DB.getArr('banners').filter(b => b.id !== id));
  toast('已删除'); renderContent();
}
function addBanner() {
  const title = document.getElementById('new-banner-title').value.trim();
  const subtitle = document.getElementById('new-banner-sub').value.trim();
  if (!title) { toast('请填写标题'); return; }
  DB.push('banners', { id: uid(), title, subtitle, color: 'linear-gradient(135deg,#ff6b35,#ff9a56)' });
  toast('轮播图已添加'); renderContent();
}
function addCate() {
  const name = document.getElementById('new-cate').value.trim();
  if (!name) { toast('请输入分类名称'); return; }
  const cates = DB.getArr('categories');
  if (cates.includes(name)) { toast('该分类已存在'); return; }
  cates.push(name);
  DB.set('categories', cates);
  toast('分类已添加'); renderContent();
}
function delCate(name) {
  if (!confirm(`确认删除分类"${name}"？`)) return;
  DB.set('categories', DB.getArr('categories').filter(c => c !== name));
  toast('已删除'); renderContent();
}
function saveNotice() {
  const content = document.getElementById('notice-content').value.trim();
  DB.set('notice', content);
  toast('公告已保存'); renderContent();
}
function sendNotice() {
  const content = DB.get('notice');
  if (!content) return;
  const users = DB.getArr('users');
  users.forEach(u => addNotif(u.id, 'system', '📢 ' + content));
  toast(`公告已发送给 ${users.length} 位用户`);
}

function adminLogout() {
  Auth.logout();
  location.href = 'login.html';
}

// 初始渲染
renderDashboard();
</script>
</body>
</html>
